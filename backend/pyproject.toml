[project]
name = "cartera-backend"
version = "0.1.0"
description = "Backend for the capital and investment manager"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0",
    "alembic>=1.14",
    "psycopg[binary]>=3.2",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "yfinance (>=0.2)",
    "httpx (>=0.28)",
]

[tool.poetry]
packages = [{ include = "app" }]

[tool.poetry.group.dev.dependencies]
pytest = ">=8.3"
ruff = ">=0.8"
mypy = ">=1.13"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# Reasonable rule set: errors, imports, common bugs, comprehensions, upgrades.
select = ["E", "F", "I", "B", "C4", "UP", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Autogenerated by `alembic revision --autogenerate` — not hand-formatted.
"alembic/versions/*.py" = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
# Tests can be a bit more lenient
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# No type stubs published for these.
[[tool.mypy.overrides]]
module = ["yfinance.*", "pandas.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
