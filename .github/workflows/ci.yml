name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Instalar dependencias
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Formato (ruff)
        run: uv run ruff format --check .

      - name: Tipos (mypy)
        run: uv run mypy app

      - name: Tests (pytest)
        run: uv run pytest -v
