services:
  # --- Reverse proxy: lo ÚNICO expuesto al exterior ---
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - caddy_data:/data
    depends_on:
      - backend
    networks:
      - interna

  # --- Backend FastAPI: SIN puerto público, solo red interna ---
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    networks:
      - interna
    # Nota: deliberadamente NO hay sección "ports". El backend solo es
    # accesible desde la red interna (el proxy). Para desarrollo local sin
    # proxy, descomenta temporalmente:
    # ports:
    #   - "8000:8000"
    # La base de datos es Supabase (Postgres gestionado, externo). El backend
    # se conecta vía DATABASE_URL en .env (Supabase session pooler).

networks:
  interna:
    driver: bridge

volumes:
  caddy_data:
