services:
  # --- Reverse proxy: the ONLY thing exposed to the outside world ---
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - caddy_data:/data
    depends_on:
      - backend
    networks:
      - interna

  # --- FastAPI backend: NO public port, internal network only ---
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    networks:
      - interna
    # Note: there is deliberately NO "ports" section. The backend is only
    # reachable from the internal network (the proxy). For local development
    # without the proxy, temporarily uncomment:
    # ports:
    #   - "8000:8000"
    # The database is Supabase (managed, externally-hosted Postgres). The backend
    # connects via DATABASE_URL in .env (Supabase session pooler).

networks:
  interna:
    driver: bridge

volumes:
  caddy_data:
