services:
  # --- Reverse proxy: lo ÚNICO expuesto al exterior ---
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv:ro
      - caddy_data:/data
    depends_on:
      - backend
    networks:
      - interna

  # --- Backend FastAPI: SIN puerto público, solo red interna ---
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interna
    # Nota: deliberadamente NO hay sección "ports". El backend solo es
    # accesible desde la red interna (el proxy). Para desarrollo local sin
    # proxy, descomenta temporalmente:
    # ports:
    #   - "8000:8000"

  # --- PostgreSQL: AISLADA, sin puerto al exterior ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - interna
    # Sin "ports": Postgres NUNCA se expone. Solo el backend le habla.

networks:
  interna:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
